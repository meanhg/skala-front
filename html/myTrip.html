<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>나의 여행지</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <a href="index.html" class="backBtn">< 뒤로가기</a>

        <h2>🌏 나의 여행 앨범 🎵</h2>
        <p>
            <audio controls>
                <source src="../esset/music.mp3" type="audio/mpeg">
            </audio>
        </p>
        <hr>
        <section class="trip-grid">
            <p class="trip-card">
                <img src="../esset/리장.jpg" alt="리장 호도협" width="400"><br>
                리장 호도협 (2025년)
            </p>
            <p class="trip-card">
                <img src="../esset/세부.jpg" alt="세부 탑스힐" width="400"><br>
                세부 탑스힐 (2024년)
            </p>
            <p class="trip-card">
                <img src="../esset/홋카이도.jpg" alt="홋카이도 대설산" width="400"><br>
                홋카이도 대설산 (2025년)
            </p>
        </section>
        <hr>
        <h2>📹 나의 여행 브이로그</h2>
        <p class="trip-card">
            <video controls width="400">
                <source src="../esset/video.mp4" type="video/mp4">
            </video><br>
            리장의 아름다운 음악 🎵
        </p>
    </div>
</body>

</html>
